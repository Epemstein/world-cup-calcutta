<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup Calcutta 2026 — v1</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1923;
            color: #e0e0e0;
            min-height: 100vh;
        }
        header {
            background: linear-gradient(135deg, #1a2a3a, #2a1a3a);
            padding: 20px 30px;
            border-bottom: 2px solid #3a4a5a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 { font-size: 1.6rem; color: #fff; }
        header .controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        header label { font-size: 0.85rem; color: #aaa; }
        header input[type="number"] {
            width: 80px;
            padding: 4px 8px;
            background: #1a2a3a;
            border: 1px solid #3a4a5a;
            color: #fff;
            border-radius: 4px;
        }
        header button, .tab-btn {
            padding: 8px 16px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
        }
        header button:hover, .tab-btn:hover { background: #1d4ed8; }
        header button:disabled { background: #555; cursor: not-allowed; }

        .tabs {
            display: flex;
            gap: 4px;
            padding: 12px 30px 0;
            background: #0f1923;
        }
        .tab-btn {
            background: #1a2a3a;
            border-bottom: 2px solid transparent;
            border-radius: 6px 6px 0 0;
            padding: 10px 20px;
        }
        .tab-btn.active {
            background: #1e293b;
            border-bottom: 2px solid #2563eb;
            color: #60a5fa;
        }

        .tab-content { display: none; padding: 20px 30px; }
        .tab-content.active { display: block; }

        /* Stage Tab */
        .stage-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .stage-header h2 { font-size: 1.2rem; }
        .pot-size-input {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .pot-size-input label { font-size: 0.9rem; color: #aaa; }
        .pot-size-input input {
            width: 100px;
            padding: 4px 8px;
            background: #1a2a3a;
            border: 1px solid #3a4a5a;
            color: #fff;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.82rem;
        }
        th {
            background: #1e293b;
            padding: 8px 6px;
            text-align: center;
            font-weight: 600;
            color: #94a3b8;
            border-bottom: 2px solid #334155;
            position: sticky;
            top: 0;
            z-index: 10;
            cursor: pointer;
            user-select: none;
        }
        th:hover { color: #60a5fa; }
        th.sorted-asc::after { content: " ▲"; font-size: 0.7rem; }
        th.sorted-desc::after { content: " ▼"; font-size: 0.7rem; }
        td {
            padding: 6px;
            text-align: center;
            border-bottom: 1px solid #1e293b;

        tr:hover { background: #1e293b; }
        td.team-name { text-align: left; font-weight: 600; white-space: nowrap; }
        td.group-cell { color: #94a3b8; }
        td.pot-cell { color: #94a3b8; font-size: 0.75rem; }
        td.elo-cell { color: #facc15; }
        td.price-cell {
            color: #34d399;
            font-weight: 700;
            font-size: 0.9rem;
        }

            font-weight: 700;
            color: #60a5fa;
            font-size: 0.9rem;
        }

        .pts-pool { color: #a78bfa; }
        .pts-knockout { color: #f472b6; }
        .pts-bonus { color: #fbbf24; }

        /* ELO editor tab */
        .elo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;

        .group-card {
            background: #1e293b;
            border-radius: 8px;
            padding: 14px;
        }
        .group-card h3 {
            font-size: 0.95rem;
            color: #60a5fa;
            margin-bottom: 10px;

            padding: 4px 0;

        .team-row span { font-size: 0.85rem; }
        .team-row input {

            padding: 3px 6px;
            background: #0f1923;
            border: 1px solid #334155;
            color: #facc15;
            border-radius: 4px;

            font-size: 0.85rem;
        }

        /* Progress bar */
        .progress-bar {
            height: 4px;
            background: #1e293b;
            border-radius: 2px;
            margin: 10px 30px;
            display: none;
        }
        .progress-bar.active { display: block; }
        .progress-fill {
            height: 100%;
            background: #2563eb;
            border-radius: 2px;
            width: 0%;
            transition: width 0.3s;
        }

        .status-text {
            text-align: center;
            color: #64748b;
            font-size: 0.8rem;
            padding: 4px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            header { flex-direction: column; gap: 10px; }
            table { font-size: 0.72rem; }
            th, td { padding: 4px 3px; }
        }
    </style>
</head>
<body>

<header>

<div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>

<!-- STAGE TAB -->
<div class="tab-content active" id="tab-stage">

                <th data-col="price">Fair Value</th>

</div>

<!-- BREAKDOWN TAB -->
<div class="tab-content" id="tab-breakdown">
    <h2 style="margin-bottom:16px; font-size:1.2rem;">Points Breakdown by Stage</h2>
    <table id="breakdownTable">
        <thead>
            <tr>
                <th data-col="rank">#</th>
                <th data-col="team" style="text-align:left">Team</th>
                <th data-col="group">Grp</th>
                <th data-col="poolWinPts" class="pts-pool">Pool W</th>
                <th data-col="poolDrawPts" class="pts-pool">Pool D</th>
                <th data-col="advanceBonus" class="pts-pool">Adv+5</th>
                <th data-col="groupWinBonus" class="pts-pool">1st+5</th>
                <th data-col="r32Pts" class="pts-knockout">R32</th>
                <th data-col="r16Pts" class="pts-knockout">R16</th>
                <th data-col="qfPts" class="pts-knockout">QF</th>
                <th data-col="sfPts" class="pts-knockout">SF</th>
                <th data-col="finalPts" class="pts-knockout">Final</th>
                <th data-col="potBonus" class="pts-bonus">Pot Bonus</th>
                <th data-col="totalPts" class="sorted-desc" style="color:#60a5fa;font-weight:700">Total</th>

</div>

<!-- ELO TAB -->
<div class="tab-content" id="tab-elo">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <h2 style="font-size:1.2rem;">Adjust Team Ratings (ELO)</h2>
        <button onclick="resetElo()" style="background:#475569;padding:6px 12px;">Reset to Defaults</button>
    </div>
    <div class="elo-grid" id="eloGrid"></div>
</div>

<script>
// ====== DATA ======
const GROUPS = {
    A: [
        { name: "Mexico", pot: 1, elo: 1809 },
        { name: "South Korea", pot: 2, elo: 1778 },
        { name: "South Africa", pot: 3, elo: 1597 },
        { name: "Czech Republic", pot: 4, elo: 1720 },
    ],
    B: [
        { name: "Canada", pot: 1, elo: 1729 },
        { name: "Qatar", pot: 2, elo: 1531 },
        { name: "Switzerland", pot: 2, elo: 1800 },
        { name: "Bosnia & Herzegovina", pot: 4, elo: 1660 },
    ],
    C: [
        { name: "Brazil", pot: 1, elo: 1944 },
        { name: "Morocco", pot: 2, elo: 1851 },
        { name: "Scotland", pot: 3, elo: 1698 },
        { name: "Haiti", pot: 4, elo: 1384 },
    ],
    D: [
        { name: "United States", pot: 1, elo: 1815 },
        { name: "Australia", pot: 2, elo: 1714 },
        { name: "Paraguay", pot: 3, elo: 1697 },
        { name: "Turkey", pot: 4, elo: 1780 },
    ],
    E: [
        { name: "Germany", pot: 1, elo: 1922 },
        { name: "Ecuador", pot: 2, elo: 1787 },
        { name: "Ivory Coast", pot: 3, elo: 1680 },
        { name: "Curaçao", pot: 4, elo: 1400 },
    ],
    F: [
        { name: "Netherlands", pot: 1, elo: 1915 },
        { name: "Japan", pot: 2, elo: 1860 },
        { name: "Tunisia", pot: 3, elo: 1660 },
        { name: "Sweden", pot: 4, elo: 1720 },
    ],
    G: [
        { name: "Belgium", pot: 1, elo: 1843 },
        { name: "Iran", pot: 2, elo: 1735 },
        { name: "Egypt", pot: 3, elo: 1636 },
        { name: "New Zealand", pot: 4, elo: 1490 },
    ],
    H: [
        { name: "Spain", pot: 1, elo: 2001 },
        { name: "Uruguay", pot: 2, elo: 1850 },
        { name: "Saudi Arabia", pot: 3, elo: 1580 },
        { name: "Cape Verde", pot: 4, elo: 1450 },
    ],
    I: [
        { name: "France", pot: 1, elo: 1984 },
        { name: "Senegal", pot: 2, elo: 1726 },
        { name: "Norway", pot: 3, elo: 1740 },
        { name: "Iraq", pot: 4, elo: 1530 },
    ],
    J: [
        { name: "Argentina", pot: 1, elo: 2060 },
        { name: "Austria", pot: 2, elo: 1748 },
        { name: "Algeria", pot: 3, elo: 1630 },
        { name: "Jordan", pot: 4, elo: 1520 },
    ],
    K: [
        { name: "Portugal", pot: 1, elo: 1964 },
        { name: "Colombia", pot: 2, elo: 1845 },
        { name: "Uzbekistan", pot: 3, elo: 1610 },
        { name: "DR Congo", pot: 4, elo: 1540 },
    ],
    L: [
        { name: "England", pot: 1, elo: 1920 },
        { name: "Croatia", pot: 2, elo: 1810 },
        { name: "Panama", pot: 3, elo: 1600 },
        { name: "Ghana", pot: 4, elo: 1510 },
    ],
};

// Deep copy for reset
const DEFAULT_GROUPS = JSON.parse(JSON.stringify(GROUPS));

// Scoring constants
const POOL_WIN = 3, POOL_DRAW = 1;
const ADVANCE_BONUS = 5, GROUP_WIN_BONUS = 5;
const KO_ROUNDS = [
    { name: "R32", win: 10, soLoss: 2 },
    { name: "R16", win: 20, soLoss: 4 },
    { name: "QF",  win: 50, soLoss: 10 },
    { name: "SF",  win: 100, soLoss: 20 },
    { name: "Final", win: 200, soLoss: 40 },
];
const POT_BONUS = 48;

// Simulation results stored globally
let simResults = null;

// ====== ELO-BASED MATCH SIMULATION ======
function winProb(eloA, eloB) {
    return 1.0 / (1.0 + Math.pow(10, (eloB - eloA) / 400));
}

function simulateMatch(eloA, eloB) {
    const pA = winProb(eloA, eloB);
    // In group stage: ~25% of matches draw historically
    // We model: draw probability peaks when teams are equal
    const drawBase = 0.25;
    const diff = Math.abs(eloA - eloB);
    const drawProb = drawBase * Math.exp(-diff / 600);
    const r = Math.random();
    if (r < drawProb) return 'draw';
    const adjustedPA = pA * (1 - drawProb);
    return Math.random() < (adjustedPA / (1 - drawProb)) ? 'A' : 'B';
}

function simulateKOMatch(eloA, eloB) {
    // No draws in knockout - but track if it "would have" been a draw (shootout)
    const pA = winProb(eloA, eloB);
    const drawBase = 0.25;
    const diff = Math.abs(eloA - eloB);
    const drawProb = drawBase * Math.exp(-diff / 600);
    const r = Math.random();
    if (r < drawProb) {
        // Shootout: 50/50 with slight edge to better team
        const soProbA = 0.45 + 0.1 * pA;
        return { winner: Math.random() < soProbA ? 'A' : 'B', shootout: true };
    }
    const adjustedPA = pA * (1 - drawProb);
    const winner = Math.random() < (adjustedPA / (1 - drawProb)) ? 'A' : 'B';
    return { winner, shootout: false };
}

// ====== SIMULATION ENGINE ======
function runOneSim() {
    const teamStats = {};
    // Initialize stats
    for (const [g, teams] of Object.entries(GROUPS)) {
        for (const t of teams) {
            teamStats[t.name] = {
                group: g, pot: t.pot, elo: t.elo,
                poolWinPts: 0, poolDrawPts: 0,
                advanceBonus: 0, groupWinBonus: 0,
                r32Pts: 0, r16Pts: 0, qfPts: 0, sfPts: 0, finalPts: 0,
                potBonus: 0, totalPts: 0,
                groupPts: 0, // for ranking within group
            };
        }
    }

    // --- Pool Play ---
    const groupWinners = {}; // group -> [1st, 2nd, 3rd]
    for (const [g, teams] of Object.entries(GROUPS)) {
        const standings = teams.map(t => ({ name: t.name, elo: t.elo, pts: 0 }));
        // Round robin
        for (let i = 0; i < standings.length; i++) {
            for (let j = i + 1; j < standings.length; j++) {
                const result = simulateMatch(standings[i].elo, standings[j].elo);
                if (result === 'A') {
                    standings[i].pts += 3;
                    teamStats[standings[i].name].poolWinPts += POOL_WIN;
                } else if (result === 'B') {
                    standings[j].pts += 3;
                    teamStats[standings[j].name].poolWinPts += POOL_WIN;
                } else {
                    standings[i].pts += 1;
                    standings[j].pts += 1;
                    teamStats[standings[i].name].poolDrawPts += POOL_DRAW;
                    teamStats[standings[j].name].poolDrawPts += POOL_DRAW;
                }
            }
        }
        // Sort by points (tiebreak: random for simplicity)
        standings.sort((a, b) => b.pts - a.pts || (Math.random() - 0.5));
        // Top 2 advance (in 48-team WC, top 2 from each group + 8 best 3rds advance)
        // For simplicity in 48-team format: top 2 advance guaranteed, 3rd place has a chance
        for (let i = 0; i < standings.length; i++) {
            teamStats[standings[i].name].groupPts = standings[i].pts;
        }
        groupWinners[g] = standings;
    }

    // Determine advancing teams: top 2 from each group (24) + 8 best 3rd-place teams
    const advancingTeams = [];
    const thirdPlaceTeams = [];
    for (const [g, standings] of Object.entries(groupWinners)) {
        // 1st place
        teamStats[standings[0].name].advanceBonus = ADVANCE_BONUS;
        teamStats[standings[0].name].groupWinBonus = GROUP_WIN_BONUS;
        advancingTeams.push({ name: standings[0].name, seed: 1, group: g });
        // 2nd place
        teamStats[standings[1].name].advanceBonus = ADVANCE_BONUS;
        advancingTeams.push({ name: standings[1].name, seed: 2, group: g });
        // 3rd place - candidate for best 3rd
        thirdPlaceTeams.push({ name: standings[2].name, pts: standings[2].pts, group: g });
    }

    // Best 8 third-place teams advance
    thirdPlaceTeams.sort((a, b) => b.pts - a.pts || (Math.random() - 0.5));
    for (let i = 0; i < 8; i++) {
        teamStats[thirdPlaceTeams[i].name].advanceBonus = ADVANCE_BONUS;
        advancingTeams.push({ name: thirdPlaceTeams[i].name, seed: 3, group: thirdPlaceTeams[i].group });
    }

    // --- Knockout Rounds ---
    // Simplified bracket: shuffle advancing teams into R32 matchups
    // (Real bracket is more structured but this is fair for Monte Carlo)
    let bracket = [...advancingTeams].sort(() => Math.random() - 0.5);

    const koRoundKeys = ['r32Pts', 'r16Pts', 'qfPts', 'sfPts', 'finalPts'];
    for (let round = 0; round < KO_ROUNDS.length; round++) {
        const nextBracket = [];
        for (let i = 0; i < bracket.length; i += 2) {
            if (i + 1 >= bracket.length) {
                nextBracket.push(bracket[i]);
                continue;
            }
            const a = bracket[i];
            const b = bracket[i + 1];
            const result = simulateKOMatch(teamStats[a.name].elo, teamStats[b.name].elo);
            const key = koRoundKeys[round];
            if (result.winner === 'A') {
                teamStats[a.name][key] = KO_ROUNDS[round].win;
                if (result.shootout) teamStats[b.name][key] = KO_ROUNDS[round].soLoss;
                nextBracket.push(a);
            } else {
                teamStats[b.name][key] = KO_ROUNDS[round].win;
                if (result.shootout) teamStats[a.name][key] = KO_ROUNDS[round].soLoss;
                nextBracket.push(b);
            }
        }
        bracket = nextBracket;
    }

    // --- Pot Bonus ---
    const potScores = { 1: {}, 2: {}, 3: {}, 4: {} };
    for (const [name, stats] of Object.entries(teamStats)) {
        const nonBonusTotal = stats.poolWinPts + stats.poolDrawPts + stats.advanceBonus +
            stats.groupWinBonus + stats.r32Pts + stats.r16Pts + stats.qfPts + stats.sfPts + stats.finalPts;
        stats.totalPts = nonBonusTotal;
        if (!potScores[stats.pot]) potScores[stats.pot] = {};
        potScores[stats.pot][name] = nonBonusTotal;
    }

    for (const [pot, scores] of Object.entries(potScores)) {
        const maxScore = Math.max(...Object.values(scores));
        const winners = Object.keys(scores).filter(n => scores[n] === maxScore);
        const bonus = POT_BONUS / winners.length;
        for (const w of winners) {
            teamStats[w].potBonus = bonus;
            teamStats[w].totalPts += bonus;
        }
    }

    return teamStats;
}

function runSimulation() {
    const numSims = parseInt(document.getElementById('simCount').value) || 10000;
    const btn = document.getElementById('runBtn');
    btn.disabled = true;
    btn.textContent = 'Running...';
    document.getElementById('progressBar').classList.add('active');

    // Initialize accumulators
    const accum = {};
    for (const [g, teams] of Object.entries(GROUPS)) {
        for (const t of teams) {
            accum[t.name] = {
                group: g, pot: t.pot, elo: t.elo,
                poolWinPts: 0, poolDrawPts: 0,
                advanceBonus: 0, groupWinBonus: 0,
                r32Pts: 0, r16Pts: 0, qfPts: 0, sfPts: 0, finalPts: 0,
                potBonus: 0, totalPts: 0,
            };
        }
    }

    let completed = 0;
    const batchSize = 500;

    function runBatch() {
        const end = Math.min(completed + batchSize, numSims);
        for (let i = completed; i < end; i++) {
            const result = runOneSim();
            for (const [name, stats] of Object.entries(result)) {
                const a = accum[name];
                a.poolWinPts += stats.poolWinPts;
                a.poolDrawPts += stats.poolDrawPts;
                a.advanceBonus += stats.advanceBonus;
                a.groupWinBonus += stats.groupWinBonus;
                a.r32Pts += stats.r32Pts;
                a.r16Pts += stats.r16Pts;
                a.qfPts += stats.qfPts;
                a.sfPts += stats.sfPts;
                a.finalPts += stats.finalPts;
                a.potBonus += stats.potBonus;
                a.totalPts += stats.totalPts;
            }
        }
        completed = end;
        const pct = (completed / numSims * 100).toFixed(0);
        document.getElementById('progressFill').style.width = pct + '%';
        document.getElementById('statusText').textContent = `Simulating... ${completed.toLocaleString()} / ${numSims.toLocaleString()}`;

        if (completed < numSims) {
            requestAnimationFrame(runBatch);
        } else {
            // Average
            simResults = {};
            for (const [name, a] of Object.entries(accum)) {
                simResults[name] = {
                    group: a.group, pot: a.pot, elo: a.elo,
                    poolWinPts: a.poolWinPts / numSims,
                    poolDrawPts: a.poolDrawPts / numSims,
                    advanceBonus: a.advanceBonus / numSims,
                    groupWinBonus: a.groupWinBonus / numSims,
                    r32Pts: a.r32Pts / numSims,
                    r16Pts: a.r16Pts / numSims,
                    qfPts: a.qfPts / numSims,
                    sfPts: a.sfPts / numSims,
                    finalPts: a.finalPts / numSims,
                    potBonus: a.potBonus / numSims,
                    totalPts: a.totalPts / numSims,
                };
            }
            renderAll();
            btn.disabled = false;
            btn.textContent = 'Run Simulation';
            document.getElementById('progressBar').classList.remove('active');
            document.getElementById('statusText').textContent =
                `${numSims.toLocaleString()} simulations completed`;
        }
    }
    requestAnimationFrame(runBatch);
}

// ====== RENDERING ======
let sortCol = 'totalPts';
let sortDir = 'desc';

function sortData(data, col, dir) {
    return [...data].sort((a, b) => {
        let va = a[col], vb = b[col];
        if (col === 'team') { va = a.name; vb = b.name; }
        if (col === 'group') { va = a.group; vb = b.group; }
        if (typeof va === 'string') return dir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
        return dir === 'asc' ? va - vb : vb - va;
    });
}

function renderAll() {
    if (!simResults) return;
    const data = Object.entries(simResults).map(([name, s]) => ({ name, ...s }));
    renderStageTable(data);
    renderBreakdownTable(data);
}

function renderStageTable(data) {
    const sorted = sortData(data, sortCol, sortDir);
    const totalPts = sorted.reduce((s, t) => s + t.totalPts, 0);
    const potSize = parseFloat(document.getElementById('potSize').value) || 0;

    const tbody = document.getElementById('stageBody');
    tbody.innerHTML = sorted.map((t, i) => {
        const fairValue = totalPts > 0 ? (t.totalPts / totalPts * potSize) : 0;
        const auctionKey = 'auction_' + t.name.replace(/[^a-zA-Z]/g, '_');
        const existingAuction = document.getElementById(auctionKey)?.value || '';
        return `<tr>
            <td>${i + 1}</td>
            <td class="team-name">${t.name}</td>
            <td class="group-cell">${t.group}</td>
            <td class="pot-cell">P${t.pot}</td>
            <td class="elo-cell">${t.elo}</td>
            <td class="total-pts">${t.totalPts.toFixed(1)}</td>
            <td class="price-cell">$${fairValue.toFixed(0)}</td>
            <td><input type="number" id="${auctionKey}" value="${existingAuction}" min="0" step="1"
                style="width:60px;padding:2px 4px;background:#0f1923;border:1px solid #334155;color:#34d399;border-radius:3px;text-align:center;font-size:0.8rem;"
                placeholder="—"></td>
        </tr>`;
    }).join('');

    // Update sort indicators
    document.querySelectorAll('#stageTable th').forEach(th => {
        th.classList.remove('sorted-asc', 'sorted-desc');
        if (th.dataset.col === sortCol) {
            th.classList.add(sortDir === 'asc' ? 'sorted-asc' : 'sorted-desc');
        }
    });
}

function renderBreakdownTable(data) {
    const sorted = sortData(data, sortCol, sortDir);
    const tbody = document.getElementById('breakdownBody');
    tbody.innerHTML = sorted.map((t, i) => `<tr>
        <td>${i + 1}</td>
        <td class="team-name">${t.name}</td>
        <td class="group-cell">${t.group}</td>
        <td class="pts-pool">${t.poolWinPts.toFixed(1)}</td>
        <td class="pts-pool">${t.poolDrawPts.toFixed(1)}</td>
        <td class="pts-pool">${t.advanceBonus.toFixed(1)}</td>
        <td class="pts-pool">${t.groupWinBonus.toFixed(1)}</td>
        <td class="pts-knockout">${t.r32Pts.toFixed(1)}</td>
        <td class="pts-knockout">${t.r16Pts.toFixed(1)}</td>
        <td class="pts-knockout">${t.qfPts.toFixed(1)}</td>
        <td class="pts-knockout">${t.sfPts.toFixed(1)}</td>
        <td class="pts-knockout">${t.finalPts.toFixed(1)}</td>
        <td class="pts-bonus">${t.potBonus.toFixed(1)}</td>
        <td class="total-pts">${t.totalPts.toFixed(1)}</td>
    </tr>`).join('');

    document.querySelectorAll('#breakdownTable th').forEach(th => {
        th.classList.remove('sorted-asc', 'sorted-desc');
        if (th.dataset.col === sortCol) {
            th.classList.add(sortDir === 'asc' ? 'sorted-asc' : 'sorted-desc');
        }
    });
}

function updatePrices() {
    if (simResults) renderAll();
}

// ====== ELO EDITOR ======
function renderEloEditor() {
    const grid = document.getElementById('eloGrid');
    grid.innerHTML = Object.entries(GROUPS).map(([g, teams]) => `
        <div class="group-card">
            <h3>Group ${g}</h3>
            ${teams.map(t => `
                <div class="team-row">
                    <span>${t.name} <small style="color:#64748b">P${t.pot}</small></span>
                    <input type="number" value="${t.elo}" min="1000" max="2200"
                        onchange="updateElo('${g}','${t.name}',this.value)">
                </div>
            `).join('')}
        </div>
    `).join('');
}

function updateElo(group, name, val) {
    const team = GROUPS[group].find(t => t.name === name);
    if (team) team.elo = parseInt(val) || team.elo;
}

function resetElo() {
    for (const [g, teams] of Object.entries(DEFAULT_GROUPS)) {
        for (let i = 0; i < teams.length; i++) {
            GROUPS[g][i].elo = teams[i].elo;
        }
    }
    renderEloEditor();
}

// ====== TABS ======
function switchTab(id) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    document.getElementById('tab-' + id).classList.add('active');
    event.target.classList.add('active');
}

// ====== SORTING ======
document.querySelectorAll('#stageTable th, #breakdownTable th').forEach(th => {
    th.addEventListener('click', () => {
        const col = th.dataset.col;
        if (!col) return;
        if (sortCol === col) {
            sortDir = sortDir === 'asc' ? 'desc' : 'asc';
        } else {
            sortCol = col;
            sortDir = col === 'team' || col === 'group' ? 'asc' : 'desc';
        }
        renderAll();
    });
});

// ====== INIT ======
renderEloEditor();
</script>

</body>
</html>
